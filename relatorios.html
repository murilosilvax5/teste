<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>SPME - Relatórios</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <script src="init.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        header h1 { font-size: 1.3rem; }

        header button {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cards {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .card p { color: #666; font-size: 0.9rem; margin-bottom: 8px; }
        .card h2 { font-size: 2rem; color: hsl(0, 83%, 49%); }

        .filtros {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filtros label { font-weight: bold; color: #333; }

        .filtros select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .filtros button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: hsl(0, 83%, 49%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th {
            background: hsl(0, 83%, 49%);
            color: white;
            padding: 12px;
            text-align: center;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
            color: #333;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }

        .sem-dados {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 Relatórios de Pedidos</h1>
        <button onclick="window.location.href='home.html'">
            <i class='bx bx-arrow-back'></i> Voltar
        </button>
    </header>

    <div class="cards">
        <div class="card">
            <p>Total de Pedidos</p>
            <h2 id="totalPedidos">—</h2>
        </div>
        <div class="card">
            <p>Faturamento</p>
            <h2 id="faturamentoTotal">—</h2>
        </div>
        <div class="card">
            <p>Ticket Médio</p>
            <h2 id="ticketMedio">—</h2>
        </div>
    </div>

    <div class="filtros">
        <label>Filtrar por dia:</label>
        <select id="filtroDia" onchange="filtrarDia()">
            <option value="">Todos</option>
        </select>
        <button onclick="limparFiltro()">Limpar filtro</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Itens</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tabelaPedidos">
            <tr><td colspan="3" class="sem-dados">Carregando...</td></tr>
        </tbody>
    </table>

    <script src="relatorio.js"></script>
</body>
</html>
