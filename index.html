    <main class="container">
        <form>
            <h1>LOGIN SPME</h1>
            <div class="input-box">

                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#" id="recovery-password-button">Esqueci a senha</a>
            </div>

            <button type="button" class="login" id="login" onclick="logar()">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>
